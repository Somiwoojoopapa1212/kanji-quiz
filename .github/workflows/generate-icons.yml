name: 아이콘 PNG 생성

on:
  push:
    branches: [main]
    paths: ['icons/icon.svg']
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick
      - name: Generate icons
        run: |
          convert -background none icons/icon.svg -resize 192x192  icons/icon-192.png
          convert -background none icons/icon.svg -resize 512x512  icons/icon-512.png
          convert -background none icons/icon.svg -resize 512x512  icons/icon-maskable-512.png
          convert -background none icons/icon.svg -resize 180x180  icons/apple-touch-icon.png
      - name: Commit icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icons/*.png
          git diff --staged --quiet || git commit -m "chore: 아이콘 PNG 자동 생성 [skip ci]"
          git push
