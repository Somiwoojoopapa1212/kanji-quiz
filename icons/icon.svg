<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a0f42"/>
      <stop offset="100%" stop-color="#12071e"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Decorative stars -->
  <circle cx="60"  cy="55"  r="3" fill="#f0c040" opacity="0.7"/>
  <circle cx="440" cy="80"  r="2" fill="#f0c040" opacity="0.5"/>
  <circle cx="80"  cy="430" r="2" fill="#f0c040" opacity="0.6"/>
  <circle cx="460" cy="420" r="3" fill="#f0c040" opacity="0.4"/>
  <circle cx="380" cy="50"  r="2" fill="#fff"    opacity="0.5"/>
  <!-- Main kanji character 漢 -->
  <text x="256" y="310" font-family="'Noto Serif SC','Hiragino Mincho Pro',serif"
        font-size="260" font-weight="900" fill="#f0c040"
        text-anchor="middle" opacity="0.95">漢</text>
  <!-- Subtitle -->
  <text x="256" y="420" font-family="'Arial Black',Arial,sans-serif"
        font-size="52" font-weight="900" fill="#f0c040"
        text-anchor="middle" letter-spacing="4">한자 퀴즈</text>
  <!-- Gold border glow -->
  <rect width="512" height="512" rx="96" fill="none"
        stroke="#f0c040" stroke-width="6" opacity="0.25"/>
</svg>
